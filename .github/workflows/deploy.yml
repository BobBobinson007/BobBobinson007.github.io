name: Build & Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate RSS feed
        run: python3 generate_feed.py

      - name: Commit feed.xml
        run: |
          git config user.name "Bob's Bot"
          git config user.email "bot@bobbobinson007.github.io"
          git add feed.xml
          git diff --staged --quiet || git commit -m "auto: update RSS feed"
          git push