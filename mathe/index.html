<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wer wird Millionär?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,700;0,9..144,900;1,9..144,600&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --paper:#f7f6f0;
  --paper2:#efeee5;
  --grid:#dcdbcd;
  --ink:#14171a;
  --ink-soft:#4c5049;
  --mut:#93968a;
  --line:#c9c7b8;
  --plot:#1d4fd8;
  --plot-soft:#dbe4fb;
  --correct:#1e7a4c;
  --correct-soft:#dcefe1;
  --wrong:#b8362a;
  --wrong-soft:#f5ddd8;
}

html,body{
  width:100%;min-height:100vh;
  background:var(--paper);
  color:var(--ink);
  font-family:'JetBrains Mono',monospace;
}

body{
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 27px,var(--grid) 27px,var(--grid) 28px),
    repeating-linear-gradient(90deg,transparent,transparent 27px,var(--grid) 27px,var(--grid) 28px);
  background-position:center top;
}

#app{
  width:100%;max-width:960px;margin:0 auto;
  padding:44px 22px 64px;
  display:flex;flex-direction:column;align-items:center;gap:34px;
}

/* ── header ── */
.head{text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px}
.eyebrow{
  font-size:11px;letter-spacing:.32em;color:var(--mut);text-transform:uppercase;font-weight:600;
}
.title-main{
  font-family:'Fraunces',serif;
  font-style:italic;
  font-weight:900;
  font-size:clamp(30px,6vw,54px);
  color:var(--ink);
  line-height:1;
}
.func{
  font-size:12px;color:var(--ink-soft);letter-spacing:.06em;
  padding-top:4px;
}
.func b{color:var(--plot);font-weight:700}

/* ── game row ── */
.game-row{
  display:grid;
  grid-template-columns:96px 1fr;
  gap:30px;
  width:100%;
  align-items:start;
}

/* ── axis (prize ladder as number line) ── */
.axis{
  display:flex;flex-direction:column-reverse;gap:1px;
  border-left:1px solid var(--ink);
  padding-left:16px;
  margin-top:6px;
}
.tick{
  position:relative;
  height:29px;
  display:flex;align-items:center;
  font-size:11px;font-weight:500;color:var(--mut);
  white-space:nowrap;
}
.tick::before{
  content:'';position:absolute;left:-16px;top:50%;
  width:10px;height:1px;background:var(--line);
  transform:translateY(-0.5px);
}
.tick.safe{color:var(--ink-soft);font-weight:700}
.tick.safe::before{width:14px;height:2px;background:var(--ink-soft)}
.tick.done{color:var(--line);text-decoration:line-through;opacity:.6}
.tick.cur{color:var(--plot);font-weight:800}
.tick.cur::before{width:14px;height:2px;background:var(--plot)}
.tick.cur::after{
  content:'';position:absolute;left:-20px;top:50%;
  width:7px;height:7px;border-radius:50%;
  background:var(--plot);
  box-shadow:0 0 0 4px var(--plot-soft);
  transform:translateY(-50%);
  transition:all .3s ease;
}

/* ── center panel ── */
.cpanel{display:flex;flex-direction:column;gap:18px;min-width:0}

/* status line */
.status{
  display:flex;justify-content:space-between;align-items:baseline;
  font-size:12px;letter-spacing:.05em;color:var(--ink-soft);
  border-bottom:1px solid var(--line);
  padding-bottom:8px;flex-wrap:wrap;gap:6px;
}
.status b{color:var(--ink);font-weight:700}
.status .val{
  font-weight:800;color:var(--plot);font-size:14px;
  transition:color .2s;
}

/* ── joker bar ── */
.joker-bar{display:flex;gap:8px;flex-wrap:wrap}
.jbtn{
  flex:1;min-width:80px;
  padding:9px 6px;
  background:transparent;
  border:1px solid var(--ink);
  color:var(--ink);
  font-family:'JetBrains Mono',monospace;
  font-size:11px;font-weight:700;letter-spacing:.08em;
  cursor:pointer;text-transform:uppercase;
  transition:background .13s,color .13s;
}
.jbtn:hover:not(.jused):not(.junavail){background:var(--ink);color:var(--paper)}
.jbtn.jused{opacity:.25;cursor:not-allowed;border-style:dashed}
.jbtn.junavail{opacity:.12;cursor:not-allowed}

/* ── question card ── */
.qcard{
  position:relative;
  background:var(--paper2);
  border:1px solid var(--ink);
  padding:26px 28px;
}
.corner{position:absolute;width:12px;height:12px;pointer-events:none}
.corner::before{content:'';position:absolute;width:11px;height:1px;background:var(--ink);top:5px;left:0}
.corner::after{content:'';position:absolute;width:1px;height:11px;background:var(--ink);left:5px;top:0}
.corner.tl{top:-6px;left:-6px}
.corner.tr{top:-6px;right:-6px}
.corner.bl{bottom:-6px;left:-6px}
.corner.br{bottom:-6px;right:-6px}

.qtag{
  font-size:11px;letter-spacing:.14em;color:var(--mut);
  text-transform:uppercase;margin-bottom:10px;font-weight:600;
}
.qtxt{
  font-family:'Fraunces',serif;
  font-weight:500;
  font-size:clamp(16px,2.3vw,21px);
  line-height:1.45;
  color:var(--ink);
  animation:qin .35s ease both;
}
@keyframes qin{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ── answers ── */
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.abtn{
  display:flex;align-items:flex-start;gap:10px;
  padding:13px 14px;
  background:var(--paper);
  border:1px solid var(--line);
  cursor:pointer;text-align:left;
  font-family:'JetBrains Mono',monospace;
  font-size:13px;font-weight:500;color:var(--ink);
  transition:border-color .13s,background .13s,transform .08s;
}
.abtn:hover:not(:disabled){border-color:var(--plot);background:var(--plot-soft)}
.abtn:active:not(:disabled){transform:scale(.985)}
.abtn:disabled{cursor:default}
.aletter{
  flex:0 0 auto;
  width:20px;height:20px;
  display:flex;align-items:center;justify-content:center;
  border:1px solid var(--ink);
  font-size:11px;font-weight:700;
  color:var(--ink);
}
.abtn.sel{border-color:var(--plot);background:var(--plot-soft)}
.abtn.sel .aletter{background:var(--plot);border-color:var(--plot);color:var(--paper)}
.abtn.ok{border-color:var(--correct);background:var(--correct-soft);animation:pop .3s ease}
.abtn.ok .aletter{background:var(--correct);border-color:var(--correct);color:var(--paper)}
.abtn.ok .aletter::after{content:'✓'}
.abtn.nope{border-color:var(--wrong);background:var(--wrong-soft);animation:shake .3s ease}
.abtn.nope .aletter{background:var(--wrong);border-color:var(--wrong);color:var(--paper)}
.abtn.nope .aletter::after{content:'✕'}
.abtn.gone{opacity:.15;pointer-events:none}
@keyframes pop{0%{transform:scale(.97)}55%{transform:scale(1.015)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}

/* ── confirm strip ── */
.confirm-strip{
  min-height:16px;text-align:center;
  font-size:11px;font-weight:700;letter-spacing:.12em;
  color:var(--mut);text-transform:uppercase;
}

/* ── action row ── */
.arow{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
.abig{
  padding:10px 30px;
  font-family:'JetBrains Mono',monospace;
  font-size:12px;font-weight:700;letter-spacing:.1em;
  border:1px solid var(--ink);
  background:var(--ink);color:var(--paper);
  cursor:pointer;text-transform:uppercase;
  transition:all .15s;
}
.abig:hover{background:var(--plot);border-color:var(--plot)}
.abig.ghost{background:transparent;color:var(--ink)}
.abig.ghost:hover{background:var(--ink);color:var(--paper)}

/* quit line */
.quitline{
  text-align:center;font-size:11px;color:var(--mut);
  letter-spacing:.04em;
}
.quitline button{
  background:none;border:none;font-family:'JetBrains Mono',monospace;
  font-size:11px;color:var(--ink-soft);text-decoration:underline;
  cursor:pointer;letter-spacing:.04em;padding:0;
}
.quitline button:hover{color:var(--wrong)}

/* ── modal ── */
.moverlay{
  position:fixed;inset:0;background:rgba(20,23,26,.55);
  z-index:200;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.moverlay.open{opacity:1;pointer-events:all}
.mbox{
  background:var(--paper);border:1px solid var(--ink);
  padding:28px 30px;max-width:440px;width:90%;
}
.mtitle{
  font-family:'Fraunces',serif;font-weight:700;font-style:italic;
  font-size:19px;margin-bottom:14px;
}
.mbody{color:var(--ink-soft);line-height:1.6;font-size:13px}
.mrow{display:flex;gap:10px;margin-top:20px}
.mclose{
  flex:1;padding:10px;background:var(--ink);color:var(--paper);
  border:1px solid var(--ink);font-family:'JetBrains Mono',monospace;
  font-weight:700;font-size:12px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;
}
.mclose.ghost{background:transparent;color:var(--ink)}
.mclose:hover{background:var(--plot);border-color:var(--plot)}
.mclose.ghost:hover{background:var(--wrong-soft);color:var(--wrong);border-color:var(--wrong)}

/* audience histogram */
.abars{display:flex;align-items:flex-end;gap:16px;height:100px;justify-content:center;margin-top:16px}
.bwrap{display:flex;flex-direction:column;align-items:center;gap:6px}
.bfill{width:30px;background:var(--plot);transition:height .7s cubic-bezier(.22,1,.36,1)}
.blbl{font-size:11px;font-weight:700;border:1px solid var(--ink);width:18px;height:18px;display:flex;align-items:center;justify-content:center}
.bpct{font-size:10px;color:var(--mut)}

/* ── end screen ── */
.endscreen{display:none;flex-direction:column;align-items:center;padding:60px 20px;gap:16px;text-align:center}
.endscreen.show{display:flex}
.endeyebrow{font-size:11px;letter-spacing:.28em;color:var(--mut);text-transform:uppercase;font-weight:600}
.endprize{
  font-family:'Fraunces',serif;font-style:italic;font-weight:900;
  font-size:clamp(42px,8vw,84px);color:var(--ink);line-height:1;
}
.endprize.won{color:var(--correct)}
.endprize.quit{color:var(--plot)}
.endsub{font-size:13px;color:var(--ink-soft);max-width:420px}
.qed{font-size:22px;color:var(--mut);margin-top:2px}

@media(max-width:640px){
  .game-row{grid-template-columns:1fr}
  .axis{
    flex-direction:row;border-left:none;border-top:1px solid var(--ink);
    padding-left:0;padding-top:12px;overflow-x:auto;gap:0;
  }
  .tick{height:auto;flex-direction:column;padding:0 8px;gap:4px}
  .tick::before{display:none}
  .tick.cur::after{display:none}
  .agrid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div id="app">

  <div class="head">
    <div class="eyebrow">Live &middot; Studio 1</div>
    <div class="title-main">Wer wird Millionär?</div>
    <div class="func">f(<b id="fqn">1</b>) : Wissen &rarr; Euro</div>
  </div>

  <div id="gmain" style="width:100%;display:flex;flex-direction:column;gap:20px">

    <div class="status">
      <span>Frage <b id="qnum">1</b> / <b id="qtotal">6</b></span>
      <span>Möglicher Gewinn <span class="val" id="qprize">100 €</span></span>
    </div>

    <div class="game-row">
      <div class="axis" id="axis"></div>

      <div class="cpanel">

        <div class="joker-bar">
          <button class="jbtn" id="j5050" onclick="useJoker('fiftyFifty')">50:50</button>
          <button class="jbtn" id="jpub"  onclick="useJoker('audience')">Publikum</button>
          <button class="jbtn" id="jtel"  onclick="useJoker('phone')">Telefon</button>
          <button class="jbtn" id="jskip" onclick="useJoker('jump')">Weiter</button>
        </div>

        <div class="qcard">
          <span class="corner tl"></span><span class="corner tr"></span>
          <span class="corner bl"></span><span class="corner br"></span>
          <div class="qtag">Aufgabe <span id="qtagn">01</span></div>
          <div class="qtxt" id="qtxt">Lade Fragen …</div>
        </div>

        <div class="agrid" id="agrid"></div>

        <div class="confirm-strip" id="cstrip"></div>

        <div class="arow" id="arow" style="display:none">
          <button class="abig" id="abig" onclick="confirmAns()">Endgültige Antwort</button>
        </div>

        <div class="quitline" id="quitline">
          Gesichert: <b id="securedAmt" style="color:var(--ink-soft)">0 €</b>
          &nbsp;&middot;&nbsp;
          <button onclick="askQuit()">Spiel beenden &amp; Gewinn nehmen</button>
        </div>

      </div>
    </div>
  </div>

  <div class="endscreen" id="endscreen">
    <div class="endeyebrow" id="eeyebrow"></div>
    <div class="endprize" id="eprize"></div>
    <div class="endsub" id="esub"></div>
    <div class="qed" id="eqed"></div>
    <button class="abig" onclick="restart()" style="margin-top:10px">Nochmal spielen</button>
  </div>
</div>

<div class="moverlay" id="moverlay" onclick="closeModal(event)">
  <div class="mbox" onclick="event.stopPropagation()">
    <div class="mtitle" id="mtitle"></div>
    <div class="mbody" id="mbody"></div>
    <div class="mrow" id="mrow">
      <button class="mclose" onclick="closeModal()">Schließen</button>
    </div>
  </div>
</div>

<script>
/* ── prize ladder data (values, not JSON — game structure only) ── */
const PRIZE_VALUES=[100,200,500,1000,4000,1000000];
const SAFE=[3,5]; // indices that are safe havens
const fmt=n=>n.toLocaleString('de-DE')+' €';
let PRIZES=PRIZE_VALUES.map(fmt);

let qs=[],cur=0,selIdx=null,answered=false,jokers={},N=6;

/* ── shuffle (Fisher–Yates) — order only, JSON structure untouched ── */
function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

async function load(){
  try{
    const r=await fetch('config.json');
    const data=await r.json();
    qs=shuffle(data);
    N=Math.min(6,qs.length);
    qs=qs.slice(0,N);
    PRIZES=PRIZE_VALUES.slice(0,N).map(fmt);
    document.getElementById('qtotal').textContent=N;
    init();
  }catch(e){
    document.getElementById('qtxt').textContent='config.json nicht gefunden. Beide Dateien in denselben Ordner legen.';
  }
}

function init(){
  cur=0;selIdx=null;answered=false;
  buildAxis();
  loadQ();
}

/* ── axis / number line ── */
function buildAxis(){
  const el=document.getElementById('axis');
  el.innerHTML='';
  PRIZES.forEach((p,i)=>{
    const d=document.createElement('div');
    d.className='tick'+(SAFE.includes(i)?' safe':'');
    d.id='tick'+i;
    d.textContent=p;
    el.appendChild(d);
  });
  refreshAxis();
}
function refreshAxis(){
  PRIZES.forEach((_,i)=>{
    const el=document.getElementById('tick'+i);
    el.classList.remove('cur','done');
    if(i<cur)el.classList.add('done');
    else if(i===cur)el.classList.add('cur');
  });
}

/* ── load question ── */
function loadQ(){
  answered=false;selIdx=null;
  const q=qs[cur];
  jokers={...q.jokers};
  document.getElementById('qnum').textContent=cur+1;
  document.getElementById('fqn').textContent=cur+1;
  document.getElementById('qtagn').textContent=String(cur+1).padStart(2,'0');
  document.getElementById('qprize').textContent=PRIZES[cur];
  const qEl=document.getElementById('qtxt');
  qEl.style.animation='none';qEl.offsetHeight;qEl.style.animation='';
  qEl.textContent=q.question;
  document.getElementById('cstrip').textContent='';
  document.getElementById('arow').style.display='none';
  document.getElementById('abig').textContent='Endgültige Antwort';
  document.getElementById('abig').onclick=confirmAns;
  document.getElementById('securedAmt').textContent=cur>0?PRIZES[cur-1]:'0 €';
  document.getElementById('quitline').style.display='block';
  refreshJokers();
  buildAnswers();
  refreshAxis();
}

function refreshJokers(){
  const q=qs[cur];
  const map={fiftyFifty:'j5050',audience:'jpub',phone:'jtel',jump:'jskip'};
  Object.keys(map).forEach(k=>{
    const el=document.getElementById(map[k]);
    el.classList.remove('jused','junavail');
    if(!q.jokers[k])el.classList.add('junavail');
    else if(!jokers[k])el.classList.add('jused');
  });
}

function buildAnswers(hidden=[]){
  const q=qs[cur];
  const g=document.getElementById('agrid');
  g.innerHTML='';
  const letters=['A','B','C','D'];
  q.answers.forEach((a,i)=>{
    const btn=document.createElement('button');
    btn.className='abtn'+(hidden.includes(i)?' gone':'');
    btn.id='ab'+i;
    btn.disabled=answered;
    btn.innerHTML=`<span class="aletter">${letters[i]}</span><span>${a}</span>`;
    btn.onclick=()=>pickAns(i);
    g.appendChild(btn);
  });
}

function pickAns(i){
  if(answered)return;
  selIdx=i;
  document.querySelectorAll('.abtn').forEach(b=>b.classList.remove('sel'));
  document.getElementById('ab'+i).classList.add('sel');
  document.getElementById('cstrip').textContent='Ist das Ihre endgültige Antwort?';
  document.getElementById('arow').style.display='flex';
}

function confirmAns(){
  if(answered||selIdx===null)return;
  answered=true;
  document.getElementById('cstrip').textContent='';
  document.querySelectorAll('.abtn').forEach(b=>{b.disabled=true;b.classList.remove('sel')});
  document.getElementById('quitline').style.display='none';
  const q=qs[cur];
  if(selIdx===q.correct){
    setTimeout(()=>{
      document.getElementById('ab'+selIdx).classList.add('ok');
      const isLast=cur>=N-1;
      document.getElementById('abig').textContent=isLast?'Gewinn einlösen':'Weiter';
      document.getElementById('abig').onclick=advance;
      document.getElementById('arow').style.display='flex';
    },500);
  }else{
    document.getElementById('ab'+selIdx).classList.add('nope');
    setTimeout(()=>document.getElementById('ab'+q.correct).classList.add('ok'),400);
    document.getElementById('abig').textContent='Spiel beenden';
    document.getElementById('abig').onclick=()=>endGame('lost');
    document.getElementById('arow').style.display='flex';
  }
}

function advance(){
  if(!answered)return;
  const q=qs[cur];
  if(selIdx!==q.correct){endGame('lost');return}
  if(cur>=N-1){endGame('won');return}
  cur++;loadQ();
}

function useJoker(type){
  if(answered)return;
  const q=qs[cur];
  if(!q.jokers[type]||!jokers[type])return;
  jokers[type]=false;
  refreshJokers();
  if(type==='fiftyFifty'){
    const wrong=[0,1,2,3].filter(i=>i!==q.correct);
    const hide=wrong.sort(()=>Math.random()-.5).slice(0,2);
    buildAnswers(hide);
  }else if(type==='audience'){
    doAudience();
  }else if(type==='phone'){
    showModal('Telefonjoker',`<p style="font-size:12px;color:var(--mut);margin-bottom:10px">Ihr Freund meldet sich …</p><p style="font-style:italic;font-family:'Fraunces',serif;font-size:16px;line-height:1.6">"${q.jokers.phone}"</p>`,[{label:'Schließen',fn:'closeModal()'}]);
  }else if(type==='jump'){
    if(cur>=N-1){showModal('Weiter-Joker','<p>Dies ist bereits die letzte Frage.</p>',[{label:'Schließen',fn:'closeModal()'}]);return}
    cur++;loadQ();
  }
}

function doAudience(){
  const q=qs[cur];
  const pct=[0,0,0,0];
  pct[q.correct]=Math.floor(Math.random()*20)+54;
  const others=[0,1,2,3].filter(i=>i!==q.correct);
  let rem=100-pct[q.correct];
  others.forEach((o,idx)=>{
    if(idx===others.length-1){pct[o]=rem;}
    else{const v=Math.floor(Math.random()*rem*.45);pct[o]=v;rem-=v;}
  });
  const letters=['A','B','C','D'];
  const bars=pct.map((p,i)=>`
    <div class="bwrap">
      <div class="bpct">${p}%</div>
      <div class="bfill" style="height:${Math.round(p*0.9)}px"></div>
      <div class="blbl">${letters[i]}</div>
    </div>`).join('');
  showModal('Publikumsjoker',`<p style="font-size:12px;color:var(--mut);text-align:center">Verteilung der Stimmen</p><div class="abars">${bars}</div>`,[{label:'Schließen',fn:'closeModal()'}]);
}

/* ── modal (supports custom action rows) ── */
function showModal(title,body,buttons){
  document.getElementById('mtitle').textContent=title;
  document.getElementById('mbody').innerHTML=body;
  const mrow=document.getElementById('mrow');
  mrow.innerHTML='';
  (buttons||[{label:'Schließen',fn:'closeModal()'}]).forEach(b=>{
    const btn=document.createElement('button');
    btn.className='mclose'+(b.ghost?' ghost':'');
    btn.textContent=b.label;
    btn.setAttribute('onclick',b.fn);
    mrow.appendChild(btn);
  });
  document.getElementById('moverlay').classList.add('open');
}
function closeModal(e){
  if(!e||e.target===document.getElementById('moverlay'))
    document.getElementById('moverlay').classList.remove('open');
}

/* ── voluntary quit ── */
function askQuit(){
  if(answered)return;
  const amt=cur>0?PRIZES[cur-1]:'0 €';
  showModal(
    'Wirklich aufhören?',
    `<p>Wenn Sie jetzt aufhören, nehmen Sie <b style="color:var(--plot)">${amt}</b> mit nach Hause.</p>`,
    [
      {label:'Weiterspielen',fn:'closeModal()',ghost:true},
      {label:'Ja, aufhören',fn:'performQuit()'}
    ]
  );
}
function performQuit(){
  closeModal();
  endGame('quit');
}

/* ── end ── */
function endGame(mode){
  document.getElementById('gmain').style.display='none';
  const es=document.getElementById('endscreen');
  es.classList.add('show');
  const eprize=document.getElementById('eprize');
  eprize.classList.remove('won','quit');
  if(mode==='won'){
    document.getElementById('eeyebrow').textContent='Ergebnis';
    eprize.textContent='1.000.000 €';
    eprize.classList.add('won');
    document.getElementById('esub').textContent='Alle sechs Fragen richtig beantwortet.';
    document.getElementById('eqed').textContent='∎';
  }else if(mode==='quit'){
    const prize=cur>0?PRIZES[cur-1]:'0 €';
    document.getElementById('eeyebrow').textContent='Freiwillig beendet';
    eprize.textContent=prize;
    eprize.classList.add('quit');
    document.getElementById('esub').textContent=`Sie haben aufgehört und nehmen ${prize} mit.`;
    document.getElementById('eqed').textContent='';
  }else{
    const safe=SAFE.filter(i=>i<cur);
    const prize=safe.length?PRIZES[safe[safe.length-1]]:'0 €';
    document.getElementById('eeyebrow').textContent='Falsche Antwort';
    eprize.textContent=prize;
    document.getElementById('esub').textContent=prize==='0 €'?'Sie verlassen das Studio ohne Gewinn.':`Sie verlassen das Studio mit ${prize}.`;
    document.getElementById('eqed').textContent='';
  }
}

function restart(){
  document.getElementById('endscreen').classList.remove('show');
  document.getElementById('gmain').style.display='';
  load();
}

load();
</script>
